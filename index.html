<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Disaster Robot — Live Dashboard</title>
<link rel="stylesheet" href="styles/stylesheet.css">
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div>
      <div class="nav-title">Disaster Robot</div>
      <div class="nav-sub">Real-time sensor data &amp; video feed</div>
    </div>
  </div>
  <div class="conn-badge">
    <div class="conn-dot" id="conn-dot"></div>
    <span id="conn-text">Connected</span>
  </div>
</nav>

<div class="page">
  <div class="left">

    <!-- WS controls -->
    <div class="ws-bar">
      <label>WS SERVER</label>
      <input id="ws-url" type="text" value="ws://YOUR_PC_IP:8765" spellcheck="false">
      <button id="btn-start">▶ Start</button>
      <button id="btn-stop" disabled>■ Stop</button>
      <button id="btn-flip">⇄ Flip cam</button>
    </div>

    <!-- Video -->
    <div class="video-card">
      <div class="video-wrap" id="vwrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="xhair"></div>

        <div class="hud hud-rec"><div class="rec-dot"></div> REC</div>
        <div class="hud hud-clock" id="clock">--:--:-- --</div>
        <div class="hud hud-cam"><div class="cam-dot2"></div><span id="cam-lbl">Arduino CAM — 30 FPS</span></div>
        <div id="det-overlay"></div>
      </div>
      <div class="stats-bar">
        <div class="stat-cell"><div class="stat-lbl">Latency</div><div class="stat-num" id="s-lat">-- ms</div></div>
        <div class="stat-cell"><div class="stat-lbl">FPS</div><div class="stat-num" id="s-fps">--</div></div>
        <div class="stat-cell"><div class="stat-lbl">Quality</div><div class="stat-num" id="s-qual">720p</div></div>
      </div>
    </div>

    <!-- Bottom row -->
    <div class="bottom-row">
      <div class="info-card"><div class="ic-lbl">Uptime</div><div class="ic-val" id="ic-up">0h 0m</div></div>
      <div class="info-card"><div class="ic-lbl">Data Points</div><div class="ic-val" id="ic-dp">18,432</div></div>
      <div class="info-card"><div class="ic-lbl">Alerts</div><div class="ic-val" id="ic-al">3</div></div>
      <div class="info-card"><div class="ic-lbl">Battery</div><div class="ic-val" id="ic-bat">87%</div></div>
    </div>
  </div>

  <!-- Sensor cards -->
  <div class="right">
    <div class="sensor-card">
      <div class="sc-head">
        <div class="sc-icon" style="background:#f5f3ff">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M2 12h2M20 12h2M12 2v2M12 20v2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/></svg>
        </div>
        <div><div class="sc-title">IR Sensor</div><div class="sc-status"><span class="sc-sdot"></span>Normal</div></div>
      </div>
      <div class="sc-val" style="color:#9333ea" id="v-ir">65.86<span>%</span></div>
      <canvas class="sc-chart" id="c-ir"></canvas>
    </div>

    <div class="sensor-card">
      <div class="sc-head">
        <div class="sc-icon" style="background:#eff6ff">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </div>
        <div><div class="sc-title">Acoustic</div><div class="sc-status"><span class="sc-sdot"></span>Normal</div></div>
      </div>
      <div class="sc-val" style="color:#2563eb" id="v-ac">79.45<span>dB</span></div>
      <canvas class="sc-chart" id="c-ac"></canvas>
    </div>

    <div class="sensor-card">
      <div class="sc-head">
        <div class="sc-icon" style="background:#fff7ed">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div><div class="sc-title">Vibration</div><div class="sc-status"><span class="sc-sdot"></span>Normal</div></div>
      </div>
      <div class="sc-val" style="color:#f97316" id="v-vib">2.71<span>g</span></div>
      <canvas class="sc-chart" id="c-vib"></canvas>
    </div>
  </div>
</div>

<script src="js/dash.js" defer></script>

</body>
</html>
